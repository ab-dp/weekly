  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

form: translateY(0) } }\n    @keyframes shimmer { 0% { background-position: 200% center } 100% { background-position: -200% center } }\n    @keyframes crownDrop { 0% { transform: translateY(-70px) rotate(-24deg) scale(.6) } 65% { transform: translateY(8px) rotate(8deg) scale(1.05) } 100% { transform: translateY(0) rotate(-10deg) scale(1) } }\n    @keyframes sparkle { 0%,100% { opacity: 0; transform: scale(.3) rotate(0deg) } 50% { opacity: 1; transform: scale(1.1) rotate(90deg) } }\n    @keyframes glintSweep { 0% { transform: translateX(-160%) skewX(-20deg) } 55% { transform: translateX(240%) skewX(-20deg) } 100% { transform: translateX(240%) skewX(-20deg) } }\n    @keyframes steamRise { 0% { opacity: 0; transform: translateY(14px) translateX(0) scale(.7) } 25% { opacity: .6 } 100% { opacity: 0; transform: translateY(-110px) translateX(-14px) scale(1.6) } }\n    @keyframes medalDrop { 0% { transform: translateY(-90px) scale(.5) } 60% { transform: translateY(10px) scale(1.06) } 80% { transform: translateY(-4px) } 100% { transform: translateY(0) scale(1) } }\n    @keyframes haloPulse { 0%,100% { opacity: .4; transform: scale(1) } 50% { opacity: .85; transform: scale(1.13) } }\n    @keyframes hintArrow { 0%,100% { transform: translateY(0) } 50% { transform: translateY(7px) } }\n    @keyframes pepperoniGlow { 0%,100% { filter: brightness(1) } 50% { filter: brightness(1.1) } }\n    @keyframes smokeA { 0% { transform: translate(-6%, 0) scale(1) } 50% { transform: translate(6%, -3%) scale(1.12) } 100% { transform: translate(-6%, 0) scale(1) } }\n    @keyframes smokeB { 0% { transform: translate(5%, 2%) scale(1.1) } 50% { transform: translate(-5%, -2%) scale(1) } 100% { transform: translate(5%, 2%) scale(1.1) } }\n    @media (max-width: 540px) { .hdr-label { display: none } }\n    @media (max-height: 780px), (max-width: 640px) { .box-scene { justify-content: flex-start !important } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div dir=\"rtl\" style=\"min-height: 100vh; background: radial-gradient(1300px 880px at 50% -8%, #3a3e49 0%, #2d3039 42%, #232630 74%, #1b1d24 100%); font-family: 'Rubik', sans-serif; color: #f3f3f6; overflow-x: hidden; position: relative;\">\n\n  <!-- stone/concrete texture overlay -->\n  <div style=\"position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 1; background: radial-gradient(circle 2px at 12% 22%, rgba(200,208,225,.07) 0 50%, transparent 55%), radial-gradient(circle 1.5px at 68% 14%, rgba(200,208,225,.06) 0 50%, transparent 55%), radial-gradient(circle 2px at 82% 66%, rgba(200,208,225,.055) 0 50%, transparent 55%), radial-gradient(circle 1.5px at 34% 78%, rgba(200,208,225,.05) 0 50%, transparent 55%), radial-gradient(circle 1px at 50% 46%, rgba(200,208,225,.045) 0 50%, transparent 55%), radial-gradient(circle 2.5px at 24% 54%, rgba(10,12,18,.35) 0 50%, transparent 55%), radial-gradient(circle 2px at 74% 40%, rgba(10,12,18,.3) 0 50%, transparent 55%); background-size: 210px 210px, 280px 280px, 240px 240px, 300px 300px, 190px 190px, 260px 260px, 230px 230px;\"><\u002Fdiv>\n  <div style=\"position: fixed; inset: -10%; pointer-events: none; z-index: 0; background: radial-gradient(closest-side, rgba(120,130,160,.12), transparent 70%); animation: smokeA 22s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position: fixed; inset: -10%; pointer-events: none; z-index: 0; background: radial-gradient(closest-side at 70% 60%, rgba(80,95,130,.12), transparent 68%); animation: smokeB 28s ease-in-out infinite;\"><\u002Fdiv>\n  <div style=\"position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(circle at 50% 32%, transparent 46%, rgba(10,12,18,.5) 100%);\"><\u002Fdiv>\n\n  <canvas ref=\"{{ fxCanvas }}\" style=\"position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 60;\"><\u002Fcanvas>\n\n  <!-- golden flash between scenes -->\n  <div style=\"position: fixed; inset: 0; z-index: 70; pointer-events: none; background: radial-gradient(circle at 50% 45%, #fff6d8 0%, rgba(255,214,110,.85) 30%, rgba(227,24,55,.25) 65%, transparent 100%); opacity: {{ flashOpacity }}; transition: opacity .55s ease;\"><\u002Fdiv>\n\n  <!-- ================= BOX SCENE ================= -->\n  <sc-if value=\"{{ showBoxScene }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; padding: 48px 18px 48px; position: relative; z-index: 1; transition: opacity .5s ease; opacity: {{ boxSceneOpacity }};\" class=\"box-scene\">\n\n      <img src=\"35036bc7-5274-4fa0-9b85-5de261de7545\" alt=\"Domino's\" style=\"width: clamp(210px, 46vw, 290px); filter: drop-shadow(0 8px 26px rgba(0,0,0,.6)); animation: fadeDown .8s ease both;\">\n\n      <div style=\"text-align: center; position: relative; animation: fadeDown .8s ease .08s both;\">\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 6px; color: #e31837; margin-bottom: 12px;\">WEEKLY CHAMPIONS<\u002Fdiv>\n        <div style=\"font-size: clamp(30px, 6vw, 54px); font-weight: 900; letter-spacing: -1px; line-height: 1.05; color: #fff;\">המצטיינים השבועיים שלנו<\u002Fdiv>\n        <div style=\"margin-top: 12px; font-size: clamp(14px, 2.6vw, 17px); color: #9a9aa4; font-weight: 500; letter-spacing: .3px;\">מוקד דומינו'ס · שבוע 27 · 29/06 – 02/07<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ REALISTIC PIZZA BOX ============ -->\n      <div onclick=\"{{ openBox }}\" style=\"cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; margin-top: 4px;\">\n        <!-- floor shadow -->\n        <div style=\"position: absolute; bottom: -30px; left: 50%; width: 76%; height: 44px; transform: translateX(-50%); background: radial-gradient(ellipse at center, rgba(0,0,0,.6) 0%, transparent 68%); filter: blur(7px);\"><\u002Fdiv>\n\n        <!-- rising steam -->\n        <sc-if value=\"{{ steamOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position: absolute; left: 50%; top: 6%; width: 160px; height: 150px; margin-left: -80px; pointer-events: none; z-index: 8;\">\n            <div style=\"position: absolute; bottom: 0; left: 30%; width: 30px; height: 90px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255,255,255,.55), transparent 70%); filter: blur(8px); animation: steamRise 2.6s ease-out infinite;\"><\u002Fdiv>\n            <div style=\"position: absolute; bottom: 0; left: 52%; width: 34px; height: 96px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255,255,255,.45), transparent 70%); filter: blur(9px); animation: steamRise 3.1s ease-out .8s infinite;\"><\u002Fdiv>\n            <div style=\"position: absolute; bottom: 0; left: 14%; width: 26px; height: 82px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255,255,255,.4), transparent 70%); filter: blur(7px); animation: steamRise 2.8s ease-out 1.5s infinite;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"perspective: 1400px; perspective-origin: 50% 32%;\">\n          <div style=\"position: relative; width: 300px; height: 300px; max-width: 84vw; transform-style: preserve-3d; animation: {{ boxFloatAnim }}; transform: rotateX(50deg) rotateZ(-1deg); margin: 40px auto 30px;\">\n\n            <!-- floor / interior liner -->\n            <div style=\"position: absolute; inset: 0; transform: translateZ(0px); background: linear-gradient(150deg, #e7ddc6 0%, #ddd0b4 50%, #d2c3a2 100%); box-shadow: inset 0 0 46px rgba(90,65,25,.45); overflow: hidden;\">\n              <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(38deg, rgba(120,90,45,.05) 0 3px, transparent 3px 8px);\"><\u002Fdiv>\n              <div style=\"position: absolute; inset: 10px; border: 1px dashed rgba(150,115,60,.3); border-radius: 3px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- back wall (blue printed edge) -->\n            <div style=\"position: absolute; top: 0; left: 0; width: 300px; height: 40px; transform-origin: top center; transform: rotateX(-90deg); background: linear-gradient(180deg, #1489c2 0%, #0c6693 55%, #0a557d 100%); box-shadow: inset 0 -12px 18px rgba(3,30,48,.5); overflow: hidden;\">\n              <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 9px);\"><\u002Fdiv>\n              <div style=\"position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(180deg, rgba(255,255,255,.35), transparent);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- left wall -->\n            <div style=\"position: absolute; top: 0; left: 0; width: 40px; height: 300px; transform-origin: left center; transform: rotateY(-90deg); background: linear-gradient(90deg, #1489c2, #0a5c86); box-shadow: inset 6px 0 16px rgba(3,30,48,.5);\">\n              <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 9px);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- right wall -->\n            <div style=\"position: absolute; top: 0; left: 260px; width: 40px; height: 300px; transform-origin: right center; transform: rotateY(90deg); background: linear-gradient(90deg, #0a5c86, #1489c2); box-shadow: inset -6px 0 16px rgba(3,30,48,.5);\">\n              <div style=\"position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 9px);\"><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ============ PIZZA ============ -->\n            <div style=\"position: absolute; left: 50%; top: 50%; width: 250px; height: 250px; transform: translate(-50%, -50%) translateZ(30px) scale({{ pizzaScale }}); transition: transform 1.15s cubic-bezier(.3, 1.15, .35, 1);\">\n              <div style=\"position: absolute; inset: -18px; border-radius: 50%; background: radial-gradient(circle, rgba(2 kBg }}; color: {{ r.rankColor }}; box-shadow: {{ r.rankShadow }};\">{{ r.rank }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display: flex; align-items: center; gap: 8px; font-weight: 700; color: #f3f3f6;\">{{ r.name }}<sc-if value=\"{{ r.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 999px; background: {{ r.badgeBg }}; color: {{ r.badgeColor }}; border: 1px solid {{ r.badgeBorder }};\">{{ r.badge }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                  <div style=\"font-weight: 900; color: {{ r.scoreColor }};\">{{ r.score }}<\u002Fdiv>\n                  <div style=\"color: #c2c2cc;\">{{ r.survey }}<\u002Fdiv>\n                  <div style=\"color: #c2c2cc;\">{{ r.handle }} דק'<\u002Fdiv>\n                  <div style=\"color: #c2c2cc;\">{{ r.calls }}<\u002Fdiv>\n                  <div style=\"color: #c2c2cc;\">{{ r.surveys }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Special achievements -->\n      <sc-if value=\"{{ allRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div data-screen-label=\"הישגים מיוחדים\" style=\"animation: riseIn .9s ease .35s both;\">\n          <div style=\"display: flex; align-items: center; gap: 14px; margin-bottom: 18px;\">\n            <div style=\"width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(160deg, #1273e0, #0a4e9e); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 8px 20px rgba(18,115,224,.35), inset 0 1.5px 0 rgba(255,255,255,.3);\">✨<\u002Fdiv>\n            <div style=\"font-size: 24px; font-weight: 900; color: #fff;\">הישגים מיוחדים השבוע<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 18px;\">\n            <sc-for list=\"{{ highlights }}\" as=\"h\" hint-placeholder-count=\"3\">\n              <div style=\"flex: 1 1 250px; position: relative; background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015)); border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 24px 22px; display: flex; flex-direction: column; gap: 9px; backdrop-filter: blur(6px); box-shadow: 0 16px 40px rgba(0,0,0,.4); overflow: hidden; transition: transform .2s ease, border-color .2s ease;\" style-hover=\"transform: translateY(-4px); border-color: rgba(255,255,255,.16);\">\n                <div style=\"position: absolute; top: 0; left: 20px; right: 20px; height: 2px; background: linear-gradient(90deg, transparent, {{ h.color }}, transparent);\"><\u002Fdiv>\n                <div style=\"font-size: 30px; filter: drop-shadow(0 0 12px {{ h.glow }});\">{{ h.icon }}<\u002Fdiv>\n                <div style=\"font-size: 13px; font-weight: 700; color: #9a9aa4;\">{{ h.label }}<\u002Fdiv>\n                <div style=\"display: flex; align-items: baseline; gap: 8px;\">\n                  <span style=\"font-size: 36px; font-weight: 900; color: {{ h.color }}; text-shadow: 0 0 22px {{ h.glow }};\">{{ h.valueDisp }}<\u002Fspan>\n                  <span style=\"font-size: 13px; color: #9a9aa4; font-weight: 600;\">{{ h.unit }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size: 17px; font-weight: 800; color: #f3f3f6;\">{{ h.name }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Closing banner -->\n      <sc-if value=\"{{ allRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div data-screen-label=\"באנר סיום\" style=\"position: relative; background: linear-gradient(120deg, #e31837 0%, #b90f29 55%, #8f0a1f 100%); border-radius: 22px; padding: 38px 30px; text-align: center; box-shadow: 0 26px 60px rgba(227,24,55,.28), inset 0 1.5px 0 rgba(255,255,255,.22); animation: riseIn .9s ease .5s both; overflow: hidden;\">\n          <div style=\"position: absolute; top: 0; bottom: 0; width: 26%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent); animation: glintSweep 4.6s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"font-size: clamp(21px, 3.4vw, 30px); font-weight: 900; color: #fff; position: relative;\">ולכל השאר — שבוע חדש מתחיל, והכול פתוח! 🚀<\u002Fdiv>\n          <div style=\"margin-top: 10px; font-size: clamp(15px, 2.4vw, 18px); color: rgba(255,255,255,.92); font-weight: 600; position: relative;\">יאללה, מי עולה לפודיום בשבוע הבא? 🏆<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display: flex; align-items: center; justify-content: center; gap: 12px; opacity: .5; font-size: 13px; font-weight: 600; color: #b6b6c0;\">\n        <img src=\"35036bc7-5274-4fa0-9b85-5de261de7545\" alt=\"\" style=\"height: 20px;\">\n        <span>· סיכום ביצועים שבועי<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startOpen&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;התנהגות&quot;, &quot;description&quot;: &quot;דילוג על הקופסה — פתיחה ישירה של התוצאות&quot;}, &quot;revealDelayMs&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 2200, &quot;min&quot;: 600, &quot;max&quot;: 5000, &quot;step&quot;: 100, &quot;unit&quot;: &quot;ms&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;התנהגות&quot;, &quot;description&quot;: &quot;השהייה בין חשיפת זוכה לזוכה&quot;}, &quot;fireworksIntensity&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0, &quot;max&quot;: 3, &quot;step&quot;: 0.5, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;אפקטים&quot;, &quot;description&quot;: &quot;עוצמת הזיקוקים והקונפטי&quot;}}\">\nclass Component extends DCLogic {\n  state = { stage: 'closed', revealed: 0 };\n\n  componentDidMount() {\n    this.particles = [];\n    this.counts = {};\n    this.countActive = false;\n    if (this.props.startOpen) this.finishOpen(true);\n    this.raf = requestAnimationFrame(() => this.tick());\n    this.onResize = () => this.sizeCanvas();\n    window.addEventListener('resize', this.onResize);\n    this.sizeCanvas();\n  }\n  componentWillUnmount() {\n    cancelAnimationFrame(this.raf);\n    window.removeEventListener('resize', this.onResize);\n    (this.timers || []).forEach(clearTimeout);\n  }\n\n  sizeCanvas() {\n    const c = this.canvas;\n    if (!c) return;\n    c.width = window.innerWidth * devicePixelRatio;\n    c.height = window.innerHeight * devicePixelRatio;\n  }\n\n  startCount(key, target, dec) {\n    this.counts[key] = { cur: 0, target, dec };\n    this.countActive = true;\n  }\n  setCount(key, target, dec) {\n    this.counts[key] = { cur: target, target, dec };\n  }\n  fmt(key, fallback) {\n    const c = this.counts && this.counts[key];\n    return c ? c.cur.toFixed(c.dec) : fallback;\n  }\n\n  openBox = () => {\n    if (this.state.stage !== 'closed') return;\n    this.timers = [];\n    this.setState({ stage: 'opening' });\n    this.timers.push(setTimeout(() => {\n      this.setState({ stage: 'pizza' });\n      this.burst(0.5, 0.5, 40, true);\n    }, 1050));\n    this.timers.push(setTimeout(() => this.setState({ stage: 'flash' }), 2500));\n    this.timers.push(setTimeout(() => this.finishOpen(false), 3050));\n  };\n\n  finishOpen(instant) {\n    this.setState({ stage: 'open', revealed: instant ? 3 : 0 });\n    window.scrollTo(0, 0);\n    if (instant) {\n      this.setCount('score1', 60.7, 1); this.setCount('score2', 60.2, 1); this.setCount('score3', 57.9, 1);\n      this.setCount('hl0', 451, 0); this.setCount('hl1', 15.2, 1); this.setCount('hl2', 4.79, 2);\n      return;\n    }\n    const delay = this.props.revealDelayMs ?? 2200;\n    const intensity = this.props.fireworksIntensity ?? 1;\n    // place revealed at step n: n1->3rd, n2->2nd, n3->1st\n    const stepScore = { 1: ['score3', 57.9], 2: ['score2', 60.2], 3: ['score1', 60.7] };\n    this.timers = [1, 2, 3].map(n =>\n      setTimeout(() => {\n        this.setState({ revealed: n });\n        const s = stepScore[n];\n        this.startCount(s[0], s[1], 1);\n        if (n === 3) {\n          this.burst(0.5, 0.28, 130 * intensity);\n          this.burst(0.22, 0.4, 80 * intensity);\n          this.burst(0.78, 0.4, 80 * intensity);\n          this.confettiRain(160 * intensity);\n          this.showUntil = performance.now() + 6500 * intensity;\n          setTimeout(() => {\n            this.startCount('hl0', 451, 0); this.startCount('hl1', 15.2, 1); this.startCount('hl2', 4.79, 2);\n          }, 400);\n        } else {\n          this.burst(n === 1 ? 0.72 : 0.28, 0.42, 60 * intensity);\n        }\n      }, 700 + delay * (n - 1))\n    );\n  }\n\n  // ---- particle engine ----\n  burst(fx, fy, count, warm) {\n    const c = this.canvas; if (!c) return;\n    const colors = warm\n      ? ['#f2c14e', '#ffb347', '#fff1c4', '#ff8a5c']\n      : ['#e31837', '#ff5c77', '#f2c14e', '#fff3cf', '#1273e0', '#7fb6f5', '#ffffff'];\n    for (let i = 0; i < count; i++) {\n      const a = Math.random() * Math.PI * 2;\n      const sp = (2 + Math.random() * 5.5) * devicePixelRatio;\n      this.particles.push({\n        kind: 'dot',\n        x: fx * c.width, y: fy * c.height,\n        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,\n        life: 1, decay: 0.007 + Math.random() * 0.012,\n        color: colors[(Math.random() * colors.length) | 0],\n        r: (1.4 + Math.random() * 2.6) * devicePixelRatio,\n      });\n    }\n  }\n  confettiRain(count) {\n    const c = this.canvas; if (!c) return;\n    const colors = ['#e31837', '#1273e0', '#f2c14e', '#ffffff', '#7fb6f5'];\n    for (let i = 0; i < count; i++) {\n      this.particles.push({\n        kind: 'rect',\n        x: Math.random() * c.width, y: -Math.random() * c.height * 0.4,\n        vx: (Math.random() - 0.5) * 1.6 * devicePixelRatio,\n        vy: (1.4 + Math.random() * 2.2) * devicePixelRatio,\n        rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.22,\n        life: 1, decay: 0.0035 + Math.random() * 0.004,\n        color: colors[(Math.random() * colors.length) | 0],\n        w: (5 + Math.random() * 6) * devicePixelRatio,\n        h: (3 + Math.random() * 4) * devicePixelRatio,\n      });\n    }\n  }\n  tick() {\n    this.raf = requestAnimationFrame(() => this.tick());\n    // count-up easing\n    if (this.countActive) {\n      let anyActive = false;\n      for (const k in this.counts) {\n        const c = this.counts[k];\n        if (Math.abs(c.cur - c.target) > c.target * 0.001 + 0.001) {\n          c.cur += (c.target - c.cur) * 0.09;\n          anyActive = true;\n        } else if (c.cur !== c.target) {\n          c.cur = c.target; anyActive = true;\n        }\n      }\n      this.forceUpdate();\n      if (!anyActive) this.countActive = false;\n    }\n    const c = this.canvas; if (!c) return;\n    const ctx = c.getContext('2d');\n    ctx.clearRect(0, 0, c.width, c.height);\n    if (this.showUntil && performance.now() < this.showUntil && Math.random() < 0.05) {\n      this.burst(0.1 + Math.random() * 0.8, 0.12 + Math.random() * 0.4, 55);\n    }\n    const g = 0.045 * devicePixelRatio;\n    this.particles = this.particles.filter(p => p.life > 0 && p.y < c.height + 40);\n    for (const p of this.particles) {\n      p.x += p.vx; p.y += p.vy;\n      p.life -= p.decay;\n      if (p.kind === 'dot') {\n        p.vy += g; p.vx *= 0.985; p.vy *= 0.985;\n        ctx.globalAlpha = Math.max(p.life, 0);\n        ctx.fillStyle = p.color;\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);\n        ctx.fill();\n      } else {\n        p.rot += p.vr;\n        p.x += Math.sin(p.y * 0.01) * 0.6 * devicePixelRatio;\n        ctx.globalAlpha = Math.max(Math.min(p.life * 2, 1), 0);\n        ctx.save();\n        ctx.translate(p.x, p.y);\n        ctx.rotate(p.rot);\n        ctx.fillStyle = p.color;\n        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);\n        ctx.restore();\n      }\n    }\n    ctx.globalAlpha = 1;\n  }\n\n  renderVals() {\n    const { stage, revealed } = this.state;\n    const _d = new Date();\n    const todayStr = String(_d.getDate()).padStart(2, '0') + '/' + String(_d.getMonth() + 1).padStart(2, '0') + '/' + _d.getFullYear();\n    const winners = [\n      {\n        place: 1, order: 2, placeLabel: 'מקום ראשון', name: 'דניאל', score: '60.7', scoreKey: 'score1',\n        accent: '#f2c14e', border: 'rgba(242,193,78,.4)', glow: 'rgba(242,193,78,.28)',\n        medalBg: 'radial-gradient(circle at 34% 28%, #fff6d0 0%, #ffe084 22%, #f6c245 44%, #d99a1c 66%, #a86f08 86%, #8a5a05 100%)',\n        medalShadow: 'rgba(130,85,0,.6)', medalRing: 'rgba(150,100,10,.55)', medalNum: '#7a5203',\n        podiumBg: 'linear-gradient(180deg, #ffe084 0%, #f0b93a 40%, #c98f14 100%)', podiumH: 96,\n        isFirst: true, glintDelay: 0.2,\n        text: 'פשוט אלופה. 💪\\nדניאל היא כבר מהוותיקות במוקד, וגם אחרי כל כך הרבה זמן ממשיכה להוכיח למה היא תמיד בצמרת. עם מקצועיות, התמדה והמון השקעה היא שוב מסיימת במקום הראשון. כל הכבוד, מגיע לך בענק! ❤️',\n      },\n      {\n        place: 2, order: 1, placeLabel: 'מקום שני', name: 'אסיל', score: '60.2', scoreKey: 'score2',\n        accent: '#dbe4f0', border: 'rgba(219,228,240,.36)', glow: 'rgba(200,215,235,.22)',\n        medalBg: 'radial-gradient(circle at 34% 28%, #ffffff 0%, #e8eef6 22%, #c4cfdd 46%, #9aa8ba 68%, #6f7d90 88%, #5c6a7c 100%)',\n        medalShadow: 'rgba(70,85,105,.6)', medalRing: 'rgba(110,125,145,.55)', medalNum: '#4a5768',\n        podiumBg: 'linear-gradient(180deg, #e8eef6 0%, #b9c5d5 45%, #8b9aad 100%)', podiumH: 68,\n        isFirst: false, glintDelay: 0.9,\n        text: 'איזה מהפך עשית בתקופה האחרונה! 🔥\\nרואים את ההשקעה, רואים את העבודה הקשה, והשבוע סיימת עם ירוק בוהק בכל המדדים. הישג מטורף, גאים
